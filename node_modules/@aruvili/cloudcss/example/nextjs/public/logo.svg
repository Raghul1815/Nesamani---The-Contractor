<svg width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Badge background -->
  <rect x="20" y="20" width="160" height="160" rx="28" fill="#0C0A1E" style="fill:rgb(12, 10, 30);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="20" y="20" width="160" height="160" rx="28" fill="none" stroke="#2D4ED8" stroke-width="1.2" style="fill:none;stroke:rgb(45, 78, 216);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Subtle inner glow ring -->
  <rect x="22" y="22" width="156" height="156" rx="27" fill="none" stroke="#1E3A8A" stroke-width="0.6" opacity="0.5" style="fill:none;stroke:rgb(30, 58, 138);color:rgb(255, 255, 255);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Cloud bumps (deep indigo-purple) -->
  <circle cx="70" cy="96" r="23" fill="#312E81" style="fill:rgb(49, 46, 129);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="102" cy="82" r="29" fill="#312E81" style="fill:rgb(49, 46, 129);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="132" cy="94" r="21" fill="#312E81" style="fill:rgb(49, 46, 129);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Cloud base body -->
  <rect x="50" y="100" width="103" height="40" rx="20" fill="#312E81" style="fill:rgb(49, 46, 129);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Lightning bolt (electric blue) -->
  <path d="M116 54 L97 102 L114 102 L88 138 L76 138 L94 102 L80 102 Z" fill="#38BDF8" style="fill:rgb(56, 189, 248);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Wind motion lines (left of cloud) -->
  <line x1="24" y1="93" x2="48" y2="93" stroke="#38BDF8" stroke-width="2.5" stroke-linecap="round" opacity="0.55" style="fill:rgb(0, 0, 0);stroke:rgb(56, 189, 248);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.55;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="21" y1="105" x2="47" y2="105" stroke="#38BDF8" stroke-width="2" stroke-linecap="round" opacity="0.38" style="fill:rgb(0, 0, 0);stroke:rgb(56, 189, 248);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.38;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="25" y1="117" x2="46" y2="117" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round" opacity="0.22" style="fill:rgb(0, 0, 0);stroke:rgb(56, 189, 248);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.22;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Wordmark -->
  <text font-family="'Inter','SF Pro Display','Segoe UI',sans-serif" font-size="54" font-weight="700" x="206" y="120" style="letter-spacing:-1.5px;fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, &quot;SF Pro Display&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:54px;font-weight:700;text-anchor:start;dominant-baseline:auto">
    <tspan fill="#FFFFFF" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, &quot;SF Pro Display&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:54px;font-weight:700;text-anchor:start;dominant-baseline:auto">Storm</tspan><tspan fill="#38BDF8" style="fill:rgb(56, 189, 248);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, &quot;SF Pro Display&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:54px;font-weight:700;text-anchor:start;dominant-baseline:auto">CSS</tspan>
  </text>

  <!-- Tagline in monospace -->
  <text x="210" y="152" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="13" fill="#475569" style="letter-spacing:0.3px;fill:rgb(71, 85, 105);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;JetBrains Mono&quot;, &quot;Fira Code&quot;, &quot;Courier New&quot;, monospace;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">{ utility-first · on-demand }</text>

</svg>