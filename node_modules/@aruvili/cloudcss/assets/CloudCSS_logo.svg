<svg width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Badge background -->
  <rect x="20" y="20" width="160" height="160" rx="28" fill="#0a1f06"/>
  <rect x="20" y="20" width="160" height="160" rx="28" fill="none" stroke="#3a7d1e" stroke-width="1.2"/>

  <!-- Subtle inner glow ring -->
  <rect x="22" y="22" width="156" height="156" rx="27" fill="none" stroke="#2d6016" stroke-width="0.6" opacity="0.5"/>

  <!-- Cloud bumps (dark green) -->
  <circle cx="70" cy="96" r="23" fill="#1a3d0f"/>
  <circle cx="102" cy="82" r="29" fill="#1a3d0f"/>
  <circle cx="132" cy="94" r="21" fill="#1a3d0f"/>
  <!-- Cloud base body -->
  <rect x="50" y="100" width="103" height="40" rx="20" fill="#1a3d0f"/>

  <!-- Lightning bolt (light green) -->
  <path d="M116 54 L97 102 L114 102 L88 138 L76 138 L94 102 L80 102 Z" fill="#b6f09c"/>

