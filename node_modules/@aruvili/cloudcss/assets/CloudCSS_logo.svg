  <line x1="24" y1="93" x2="48" y2="93" stroke="#b6f09c" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="21" y1="105" x2="47" y2="105" stroke="#b6f09c" stroke-width="2" stroke-linecap="round" opacity="0.38"/>
  <line x1="25" y1="117" x2="46" y2="117" stroke="#b6f09c" stroke-width="1.5" stroke-linecap="round" opacity="0.22"/>

  <!-- Wordmark -->
  <text font-family="'Inter','SF Pro Display','Segoe UI',sans-serif" font-size="54" font-weight="700" x="206" y="120" style="letter-spacing:-1.5px">
    <tspan fill="#FFFFFF">Cloud</tspan><tspan fill="#b6f09c">CSS</tspan>
  </text>

  <!-- Tagline in monospace -->
  <text x="210" y="152" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="13" fill="#4a7a35" style="letter-spacing:0.3px">{ utility-first · on-demand }</text>

</svg>
