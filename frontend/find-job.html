<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Find Workers — Nesamani</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
  /* ══════════════════════════════════════
     NESAMANI — Find Workers Page
     Warm Artisan Design System
  ══════════════════════════════════════ */
  :root {
    --soil:    #1a1208;
    --bark:    #2d1f0e;
    --earth:   #5c3d1e;
    --clay:    #9b6b3a;
    --sand:    #d4a96a;
    --cream:   #f5eed8;
    --ivory:   #faf7ef;
    --gold:    #c9943a;
    --gold-lt: #e8c47a;
    --sage:    #6b8f6e;
    --muted:   #8a7a63;
    --error:   #c0392b;
    --radius:  12px;
    --radius-lg: 20px;
    --shadow:  0 8px 32px rgba(26,18,8,.1);
    --shadow-lg: 0 24px 64px rgba(26,18,8,.18);
    --trans:   .22s cubic-bezier(.4,0,.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--ivory);
    color: var(--soil);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(201,148,58,.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,148,58,.045) 1px, transparent 1px);
    background-size: 52px 52px;
    pointer-events: none; z-index: 0;
  }

  /* 
     NAVBAR
  */
  header {
    position: sticky; top: 0; z-index: 200;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5%;
    height: 68px;
    background: rgba(250,247,239,.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(201,148,58,.12);
    box-shadow: 0 2px 16px rgba(26,18,8,.06);
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
  }
  .nav-logo-mark {
    width: 36px; height: 36px; border-radius: 9px;
    background: linear-gradient(135deg, var(--earth), var(--gold));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 10px rgba(201,148,58,.3);
  }
  .nav-logo-mark span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px; font-weight: 700; color: white; line-height: 1;
  }
  .nav-logo-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 21px; font-weight: 600; color: var(--soil); letter-spacing: -.3px;
  }
  .nav-right { display: flex; align-items: center; gap: 8px; }
  .nav-link {
    padding: 7px 16px; font-size: 13.5px; font-weight: 500;
    color: var(--muted); text-decoration: none; border-radius: 8px;
    transition: color var(--trans), background var(--trans);
  }
  .nav-link:hover { color: var(--earth); background: rgba(201,148,58,.08); }
  .nav-cta {
    padding: 8px 20px;
    background: linear-gradient(135deg, var(--earth), var(--gold));
    color: white; text-decoration: none;
    border-radius: 8px; font-size: 13.5px; font-weight: 500;
    box-shadow: 0 3px 12px rgba(92,61,30,.28);
    transition: transform var(--trans), box-shadow var(--trans);
  }
  .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(92,61,30,.35); }

  /* 
     PAGE HERO / SEARCH BAR
 */
  .page-hero {
    background: var(--bark);
    background-image: radial-gradient(ellipse at 20% 50%, rgba(201,148,58,.2) 0%, transparent 55%),
                      radial-gradient(ellipse at 80% 50%, rgba(92,61,30,.5) 0%, transparent 55%);
    padding: 48px 5% 56px;
    position: relative; overflow: hidden;
  }
  .page-hero::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px; border-radius: 50%;
    top: -160px; right: -80px;
    border: 1px solid rgba(201,148,58,.15);
    pointer-events: none;
  }

  .hero-label {
    font-size: 11px; font-weight: 500; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--sand);
    margin-bottom: 10px;
    animation: fadeUp .5s ease both;
  }
  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 4vw, 44px); font-weight: 700;
    color: var(--cream); letter-spacing: -.5px;
    margin-bottom: 28px; line-height: 1.15;
    animation: fadeUp .5s .08s ease both;
  }
  .hero-title em { font-style: italic; color: var(--gold-lt); }

  /* ── Search bar ── */
  .search-bar {
    display: flex; align-items: stretch; gap: 8px;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(201,148,58,.2);
    border-radius: var(--radius-lg);
    padding: 8px;
    max-width: 780px;
    animation: fadeUp .5s .16s ease both;
    backdrop-filter: blur(8px);
  }
  .sb-field {
    flex: 1; display: flex; align-items: center; gap: 9px;
    padding: 10px 14px;
    border-radius: var(--radius);
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(201,148,58,.15);
    transition: background var(--trans), border-color var(--trans);
  }
  .sb-field:focus-within {
    background: rgba(255,255,255,.14);
    border-color: rgba(201,148,58,.4);
  }
  .sb-field svg { width: 15px; height: 15px; color: var(--sand); flex-shrink: 0; }
  .sb-field select, .sb-field input {
    flex: 1; background: transparent; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--cream);
    outline: none; appearance: none; -webkit-appearance: none;
  }
  .sb-field select option { color: var(--soil); background: white; }
  .sb-field select:invalid { color: rgba(212,169,106,.6); }
  .sb-field input::placeholder { color: rgba(212,169,106,.6); }
  .sb-divider { width: 1px; background: rgba(201,148,58,.2); margin: 6px 0; }
  .btn-search {
    padding: 12px 24px;
    background: linear-gradient(135deg, var(--gold), var(--sand));
    color: var(--bark); border: none; border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
    display: flex; align-items: center; gap: 7px;
    transition: transform var(--trans), box-shadow var(--trans);
    box-shadow: 0 3px 12px rgba(201,148,58,.4);
  }
  .btn-search:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(201,148,58,.5); }
  .btn-search svg { width: 15px; height: 15px; }

  /* ── Result count badge ── */
  .result-meta {
    margin-top: 18px; display: flex; align-items: center; gap: 12px;
    animation: fadeUp .5s .24s ease both;
  }
  .result-count {
    font-size: 13px; color: rgba(212,169,106,.8);
  }
  .result-count strong { color: var(--gold-lt); font-weight: 500; }
  .active-filter-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-tag {
    padding: 3px 10px;
    background: rgba(201,148,58,.15);
    border: 1px solid rgba(201,148,58,.25);
    border-radius: 99px; font-size: 11px; color: var(--sand);
    display: flex; align-items: center; gap: 5px; cursor: pointer;
    transition: background var(--trans);
  }
  .filter-tag:hover { background: rgba(201,148,58,.25); }
  .filter-tag svg { width: 10px; height: 10px; }

  /* ══════════════════════════════════════
     MAIN LAYOUT
  ══════════════════════════════════════ */
  .page-body {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 28px;
    padding: 32px 5% 60px;
    position: relative; z-index: 1;
    max-width: 1400px; margin: 0 auto;
  }

  /* ══════════════════════════════════════
     FILTER SIDEBAR
  ══════════════════════════════════════ */
  .sidebar {
    position: sticky; top: 84px;
    height: fit-content;
    background: white; border-radius: var(--radius-lg);
    padding: 28px 24px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(201,148,58,.1);
    animation: fadeUp .5s .1s ease both;
  }
  .sidebar-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 600; color: var(--soil);
    margin-bottom: 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .clear-btn {
    font-size: 11px; color: var(--gold); font-weight: 500;
    background: none; border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    padding: 3px 8px; border-radius: 4px;
    transition: background var(--trans);
  }
  .clear-btn:hover { background: rgba(201,148,58,.08); }

  .filter-section { margin-bottom: 26px; }
  .filter-label {
    font-size: 11px; font-weight: 500; letter-spacing: .8px;
    text-transform: uppercase; color: var(--earth);
    margin-bottom: 12px; display: block;
  }

  /* Checkbox group */
  .check-group { display: flex; flex-direction: column; gap: 9px; }
  .check-item { display: flex; align-items: center; gap: 9px; cursor: pointer; }
  .check-item input[type="checkbox"] { display: none; }
  .check-box {
    width: 17px; height: 17px; flex-shrink: 0;
    border: 1.5px solid #d4b98a; border-radius: 4px;
    background: var(--ivory); position: relative;
    transition: background var(--trans), border-color var(--trans);
  }
  .check-item input:checked ~ .check-box { background: var(--gold); border-color: var(--gold); }
  .check-item input:checked ~ .check-box::after {
    content: ''; position: absolute;
    top: 2px; left: 5px; width: 4px; height: 7px;
    border: 2px solid white; border-top: none; border-left: none;
    transform: rotate(40deg);
  }
  .check-text { font-size: 13.5px; color: var(--soil); }
  .check-count { margin-left: auto; font-size: 11px; color: var(--muted); }

  /* Rating stars filter */
  .star-filter { display: flex; flex-direction: column; gap: 8px; }
  .star-row {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; padding: 5px 8px; border-radius: 6px;
    transition: background var(--trans);
  }
  .star-row:hover { background: var(--cream); }
  .star-row input[type="radio"] { display: none; }
  .star-row.selected { background: rgba(201,148,58,.08); }
  .stars-display { color: var(--gold); font-size: 12px; letter-spacing: 1px; }
  .star-label { font-size: 12px; color: var(--muted); }

  /* Range slider */
  .range-wrap { padding: 4px 0; }
  .range-labels { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .range-labels span { font-size: 11px; color: var(--muted); }
  input[type="range"] {
    width: 100%; appearance: none; height: 4px;
    background: linear-gradient(to right, var(--gold) 0%, var(--gold) 50%, #e8dcc8 50%, #e8dcc8 100%);
    border-radius: 99px; outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: var(--gold); border: 2px solid white;
    box-shadow: 0 2px 6px rgba(201,148,58,.4);
    transition: transform var(--trans);
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

  .apply-filters-btn {
    width: 100%; padding: 11px;
    background: linear-gradient(135deg, var(--earth), var(--gold));
    color: white; border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; margin-top: 4px;
    transition: transform var(--trans), box-shadow var(--trans);
    box-shadow: 0 3px 12px rgba(92,61,30,.28);
  }
  .apply-filters-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(92,61,30,.35); }

  /* ══════════════════════════════════════
     RESULTS AREA
  ══════════════════════════════════════ */
  .results-area { min-width: 0; }

  /* ── Sort bar ── */
  .sort-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
    animation: fadeUp .5s .15s ease both;
  }
  .sort-label { font-size: 13px; color: var(--muted); }
  .sort-group { display: flex; gap: 6px; }
  .sort-btn {
    padding: 6px 14px; font-size: 12.5px; font-weight: 500;
    color: var(--muted); background: white;
    border: 1.5px solid #e8dcc8; border-radius: 99px;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: color var(--trans), border-color var(--trans), background var(--trans);
  }
  .sort-btn:hover { color: var(--earth); border-color: rgba(201,148,58,.3); }
  .sort-btn.active {
    color: var(--earth); border-color: var(--gold);
    background: rgba(201,148,58,.08);
  }
  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    width: 34px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    border: 1.5px solid #e8dcc8; background: white; cursor: pointer;
    color: var(--muted); transition: all var(--trans);
  }
  .view-btn.active { color: var(--earth); border-color: var(--gold); background: rgba(201,148,58,.08); }
  .view-btn svg { width: 15px; height: 15px; }

  /* ══════════════════════════════════════
     WORKER CARDS GRID
  ══════════════════════════════════════ */
  .workers-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }
  .workers-grid.list-view { grid-template-columns: 1fr; }

  .worker-card {
    background: white; border-radius: var(--radius-lg);
    border: 1.5px solid rgba(201,148,58,.08);
    box-shadow: 0 4px 16px rgba(26,18,8,.06);
    overflow: hidden; cursor: pointer;
    transition: transform var(--trans), box-shadow var(--trans), border-color var(--trans);
    animation: cardIn .4s ease both;
    position: relative;
  }
  .worker-card:hover {
    transform: translateY(-5px);
    box-shadow: var(--shadow);
    border-color: rgba(201,148,58,.22);
  }

  /* Card accent bar */
  .worker-card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--earth), var(--gold));
    transform: scaleX(0); transform-origin: left;
    transition: transform var(--trans);
  }
  .worker-card:hover::before { transform: scaleX(1); }

  .card-body { padding: 22px 22px 18px; }

  /* Top row */
  .card-top { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
  .card-avatar {
    width: 52px; height: 52px; flex-shrink: 0;
    border-radius: 14px; font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    background: var(--cream);
    border: 2px solid rgba(201,148,58,.15);
    position: relative;
  }
  .avatar-status {
    position: absolute; bottom: -2px; right: -2px;
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid white;
  }
  .avatar-status.available { background: var(--sage); }
  .avatar-status.busy      { background: var(--sand); }
  .avatar-status.offline   { background: #ccc; }

  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-size: 15px; font-weight: 500; color: var(--soil);
    margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-role { font-size: 12.5px; color: var(--muted); margin-bottom: 5px; }
  .card-rating {
    display: flex; align-items: center; gap: 4px;
    font-size: 12.5px; font-weight: 500; color: var(--gold);
  }
  .card-rating svg { width: 13px; height: 13px; fill: var(--gold); }
  .card-rating span { color: var(--muted); font-weight: 300; font-size: 11px; }

  /* Availability badge */
  .card-badge {
    padding: 3px 9px; border-radius: 99px;
    font-size: 10.5px; font-weight: 500;
    display: flex; align-items: center; gap: 4px; flex-shrink: 0;
  }
  .card-badge.available { background: rgba(107,143,110,.12); color: var(--sage); }
  .card-badge.busy      { background: rgba(212,169,106,.15); color: var(--clay); }
  .card-badge.offline   { background: rgba(138,122,99,.1);   color: var(--muted); }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  /* Skills tags */
  .card-skills { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }
  .skill-tag {
    padding: 3px 9px; background: var(--ivory);
    border-radius: 99px; font-size: 11px;
    color: var(--earth); font-weight: 500;
    border: 1px solid rgba(201,148,58,.15);
  }

  /* Stats row */
  .card-stats {
    display: flex; gap: 0;
    border-top: 1px solid rgba(201,148,58,.1);
    border-bottom: 1px solid rgba(201,148,58,.1);
    margin-bottom: 16px;
  }
  .card-stat {
    flex: 1; padding: 10px 6px; text-align: center;
    border-right: 1px solid rgba(201,148,58,.1);
  }
  .card-stat:last-child { border-right: none; }
  .stat-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 600; color: var(--soil);
    line-height: 1;
  }
  .stat-key { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* Footer */
  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .card-loc {
    display: flex; align-items: center; gap: 4px;
    font-size: 12px; color: var(--muted);
  }
  .card-loc svg { width: 12px; height: 12px; }

  .btn-hire {
    padding: 8px 18px;
    background: var(--soil); color: white;
    border: none; border-radius: 7px;
    font-family: 'DM Sans', sans-serif; font-size: 12.5px; font-weight: 500;
    cursor: pointer;
    transition: background var(--trans), transform var(--trans);
    display: flex; align-items: center; gap: 5px;
  }
  .btn-hire:hover { background: var(--earth); transform: translateY(-1px); }
  .btn-hire svg { width: 13px; height: 13px; }

  /* ── List view card ── */
  .workers-grid.list-view .card-body {
    display: flex; align-items: center; gap: 20px; padding: 18px 22px;
  }
  .workers-grid.list-view .card-top { margin-bottom: 0; flex-shrink: 0; }
  .workers-grid.list-view .card-skills { margin-bottom: 0; }
  .workers-grid.list-view .card-stats { display: none; }
  .workers-grid.list-view .card-info-block { flex: 1; min-width: 0; }
  .workers-grid.list-view .card-footer { flex-shrink: 0; flex-direction: column; align-items: flex-end; gap: 8px; }

  /* ── Empty state ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center; padding: 80px 20px;
    color: var(--muted);
  }
  .empty-state .empty-icon { font-size: 52px; margin-bottom: 16px; opacity: .5; }
  .empty-state h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; color: var(--soil); margin-bottom: 8px;
  }
  .empty-state p { font-size: 14px; font-weight: 300; }

  /* ══════════════════════════════════════
     WORKER PROFILE MODAL
  ══════════════════════════════════════ */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(26,18,8,.55);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity .3s ease;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: white; border-radius: var(--radius-lg);
    width: 100%; max-width: 560px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
    transform: scale(.94) translateY(20px);
    transition: transform .35s cubic-bezier(.34,1.4,.64,1);
    scrollbar-width: thin; scrollbar-color: var(--sand) transparent;
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }

  .modal-header {
    background: var(--bark);
    background-image: radial-gradient(ellipse at 30% 50%, rgba(201,148,58,.22) 0%, transparent 60%);
    padding: 32px 32px 28px;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    width: 32px; height: 32px; border-radius: 8px;
    background: rgba(255,255,255,.1); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--sand); transition: background var(--trans);
  }
  .modal-close:hover { background: rgba(255,255,255,.18); }
  .modal-close svg { width: 16px; height: 16px; }

  .modal-avatar-row { display: flex; align-items: flex-end; gap: 16px; margin-bottom: 16px; }
  .modal-avatar {
    width: 72px; height: 72px; border-radius: 18px;
    background: var(--cream); border: 3px solid rgba(201,148,58,.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 34px; flex-shrink: 0;
  }
  .modal-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px; font-weight: 700; color: var(--cream);
    letter-spacing: -.3px; margin-bottom: 4px;
  }
  .modal-role { font-size: 14px; color: var(--sand); font-weight: 300; }

  .modal-meta-row {
    display: flex; gap: 16px; flex-wrap: wrap;
  }
  .modal-meta-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 12.5px; color: rgba(212,169,106,.8);
  }
  .modal-meta-item svg { width: 13px; height: 13px; }

  .modal-body { padding: 28px 32px; }

  .modal-section { margin-bottom: 24px; }
  .modal-section-title {
    font-size: 11px; font-weight: 500; letter-spacing: .8px;
    text-transform: uppercase; color: var(--earth); margin-bottom: 12px;
  }

  .modal-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; margin-bottom: 24px;
  }
  .modal-stat-card {
    background: var(--ivory); border-radius: var(--radius);
    padding: 14px 12px; text-align: center;
    border: 1px solid rgba(201,148,58,.1);
  }
  .modal-stat-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; font-weight: 700; color: var(--soil); line-height: 1;
  }
  .modal-stat-key { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .modal-skills { display: flex; gap: 7px; flex-wrap: wrap; }
  .modal-skill-tag {
    padding: 5px 13px; background: var(--cream);
    border-radius: 99px; font-size: 12.5px;
    color: var(--earth); font-weight: 500;
    border: 1px solid rgba(201,148,58,.2);
  }

  .modal-bio {
    font-size: 14px; font-weight: 300; color: var(--muted);
    line-height: 1.75;
  }

  .modal-reviews { display: flex; flex-direction: column; gap: 12px; }
  .review-item {
    background: var(--ivory); border-radius: var(--radius);
    padding: 14px 16px;
    border-left: 3px solid rgba(201,148,58,.25);
  }
  .review-stars { color: var(--gold); font-size: 11px; margin-bottom: 5px; }
  .review-text { font-size: 13px; font-weight: 300; color: var(--muted); line-height: 1.6; font-style: italic; }
  .review-author { font-size: 11.5px; color: var(--clay); margin-top: 6px; font-weight: 500; }

  .modal-footer {
    padding: 20px 32px 28px;
    border-top: 1px solid rgba(201,148,58,.1);
    display: flex; gap: 10px;
  }
  .btn-modal-primary {
    flex: 1; padding: 13px;
    background: linear-gradient(135deg, var(--earth), var(--gold));
    color: white; border: none; border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer;
    transition: transform var(--trans), box-shadow var(--trans);
    box-shadow: 0 3px 14px rgba(92,61,30,.3);
  }
  .btn-modal-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(92,61,30,.38); }
  .btn-modal-secondary {
    padding: 13px 20px;
    background: white; color: var(--earth);
    border: 1.5px solid rgba(201,148,58,.25); border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer;
    transition: border-color var(--trans), background var(--trans);
  }
  .btn-modal-secondary:hover { border-color: var(--gold); background: rgba(201,148,58,.05); }

  /* ══════════════════════════════════════
     TOAST
  ══════════════════════════════════════ */
  .toast {
    position: fixed; bottom: 28px; right: 28px; z-index: 1000;
    background: var(--soil); color: var(--cream);
    padding: 13px 18px; border-radius: var(--radius);
    display: flex; align-items: center; gap: 9px;
    font-size: 13.5px; box-shadow: var(--shadow);
    transform: translateY(80px); opacity: 0; pointer-events: none;
    transition: transform .4s cubic-bezier(.34,1.56,.64,1), opacity .3s ease;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast svg { width: 16px; height: 16px; color: var(--sage); flex-shrink: 0; }

  /* ══════════════════════════════════════
     ANIMATIONS
  ══════════════════════════════════════ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(14px) scale(.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ══════════════════════════════════════
     RESPONSIVE
  ══════════════════════════════════════ */
  @media (max-width: 960px) {
    .page-body { grid-template-columns: 1fr; }
    .sidebar { position: static; display: none; }
    .sidebar.mobile-open { display: block; }
  }
  @media (max-width: 640px) {
    .search-bar { flex-wrap: wrap; }
    .sb-divider { display: none; }
    .modal-body { padding: 20px; }
    .modal-footer { padding: 16px 20px 24px; }
    .modal-header { padding: 24px 20px 20px; }
    .modal-stats { grid-template-columns: repeat(3,1fr); gap: 8px; }
    .page-hero { padding: 36px 5% 44px; }
  }
  </style>
</head>
<body>

  <!-- ══ NAVBAR ══════════════════════════ -->
  <header>
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-mark"><span>N</span></div>
      <span class="nav-logo-text">Nesamani</span>
    </a>
    <div class="nav-right">
      <a href="index.html" class="nav-link">Home</a>
      <a href="login.html" class="nav-link">Login</a>
      <a href="register.html" class="nav-cta">Join Free →</a>
    </div>
  </header>

  <!-- ══ HERO / SEARCH BAR ════════════════ -->
  <section class="page-hero">
    <p class="hero-label">Browse Workers</p>
    <h1 class="hero-title">Find the right <em>skilled hand</em><br>for every job.</h1>

    <div class="search-bar">
      <div class="sb-field">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <select id="searchCategory">
          <option value="">All Categories</option>
          <option value="Plumber">🔧 Plumber</option>
          <option value="Electrician">⚡ Electrician</option>
          <option value="Painter">🎨 Painter</option>
          <option value="Driver">🚗 Driver</option>
          <option value="Maid">🏠 Maid</option>
          <option value="Carpenter">🪵 Carpenter</option>
          <option value="Gardener">🌿 Gardener</option>
          <option value="Cook">🍳 Cook</option>
        </select>
      </div>
      <div class="sb-divider"></div>
      <div class="sb-field">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
        </svg>
        <input type="text" id="searchLocation" placeholder="City or area…">
      </div>
      <button class="btn-search" onclick="applySearch()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        Search
      </button>
    </div>

    <div class="result-meta">
      <span class="result-count" id="resultCount">Showing <strong>0</strong> workers</span>
      <div class="active-filter-tags" id="activeTags"></div>
    </div>
  </section>

  <!-- ══ PAGE BODY ════════════════════════ -->
  <div class="page-body">

    <!-- FILTER SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title">
        Filters
        <button class="clear-btn" onclick="clearAllFilters()">Clear all</button>
      </div>

      <!-- Category -->
      <div class="filter-section">
        <span class="filter-label">Category</span>
        <div class="check-group" id="categoryFilters">
          <label class="check-item">
            <input type="checkbox" value="Plumber" onchange="applyFilters()">
            <span class="check-box"></span>
            <span class="check-text">Plumber</span>
            <span class="check-count">12</span>
          </label>
          <label class="check-item">
            <input type="checkbox" value="Electrician" onchange="applyFilters()">
            <span class="check-box"></span>
            <span class="check-text">Electrician</span>
            <span class="check-count">9</span>
          </label>
          <label class="check-item">
            <input type="checkbox" value="Painter" onchange="applyFilters()">
            <span class="check-box"></span>
            <span class="check-text">Painter</span>
            <span class="check-count">7</span>
          </label>
          <label class="check-item">
            <input type="checkbox" value="Driver" onchange="applyFilters()">
            <span class="check-box"></span>
            <span class="check-text">Driver</span>
            <span class="check-count">15</span>
          </label>
          <label class="check-item">
            <input type="checkbox" value="Maid" onchange="applyFilters()">
            <span class="check-box"></span>
            <span class="check-text">Maid</span>
            <span class="check-count">18</span>
          </label>
          <label class="check-item">
            <input type="checkbox" value="Carpenter" onchange="applyFilters()">
            <span class="check-box"></span>
            <span class="check-text">Carpenter</span>
            <span class="check-count">6</span>
          </label>
          <label class="check-item">
            <input type="checkbox" value="Gardener" onchange="applyFilters()">
            <span class="check-box"></span>
            <span class="check-text">Gardener</span>
            <span class="check-count">5</span>
          </label>
          <label class="check-item">
            <input type="checkbox" value="Cook" onchange="applyFilters()">
            <span class="check-box"></span>
            <span class="check-text">Cook</span>
            <span class="check-count">8</span>
          </label>
        </div>
      </div>

      <!-- Availability -->
      <div class="filter-section">
        <span class="filter-label">Availability</span>
        <div class="check-group">
          <label class="check-item">
            <input type="checkbox" value="available" id="avail-available" onchange="applyFilters()">
            <span class="check-box"></span>
            <span class="check-text">Available Now</span>
          </label>
          <label class="check-item">
            <input type="checkbox" value="busy" id="avail-busy" onchange="applyFilters()">
            <span class="check-box"></span>
            <span class="check-text">Busy</span>
          </label>
        </div>
      </div>

      <!-- Minimum Rating -->
      <div class="filter-section">
        <span class="filter-label">Minimum Rating</span>
        <div class="star-filter" id="ratingFilter">
          <label class="star-row selected" data-val="0">
            <input type="radio" name="rating" value="0" checked onchange="applyFilters()">
            <span class="stars-display">★★★★★</span>
            <span class="star-label">Any</span>
          </label>
          <label class="star-row" data-val="4">
            <input type="radio" name="rating" value="4" onchange="applyFilters()">
            <span class="stars-display">★★★★</span>
            <span class="star-label">4.0+</span>
          </label>
          <label class="star-row" data-val="4.5">
            <input type="radio" name="rating" value="4.5" onchange="applyFilters()">
            <span class="stars-display">★★★★½</span>
            <span class="star-label">4.5+</span>
          </label>
          <label class="star-row" data-val="4.8">
            <input type="radio" name="rating" value="4.8" onchange="applyFilters()">
            <span class="stars-display">★★★★★</span>
            <span class="star-label">4.8+</span>
          </label>
        </div>
      </div>

      <!-- Experience -->
      <div class="filter-section">
        <span class="filter-label">Min. Experience: <strong id="expLabel">0 yrs</strong></span>
        <div class="range-wrap">
          <input type="range" id="expRange" min="0" max="15" value="0"
            oninput="document.getElementById('expLabel').textContent=this.value+' yrs'; updateRangeStyle(this); applyFilters()">
          <div class="range-labels"><span>0</span><span>15 yrs</span></div>
        </div>
      </div>

      <button class="apply-filters-btn" onclick="applyFilters()">Apply Filters</button>
    </aside>

    <!-- RESULTS -->
    <div class="results-area">
      <!-- Sort bar -->
      <div class="sort-bar">
        <span class="sort-label">Sort by:</span>
        <div class="sort-group">
          <button class="sort-btn active" data-sort="rating" onclick="setSort(this)">Top Rated</button>
          <button class="sort-btn" data-sort="experience" onclick="setSort(this)">Experience</button>
          <button class="sort-btn" data-sort="jobs" onclick="setSort(this)">Most Hired</button>
          <button class="sort-btn" data-sort="name" onclick="setSort(this)">Name A–Z</button>
        </div>
        <div class="view-toggle">
          <button class="view-btn active" id="gridViewBtn" onclick="setView('grid')" title="Grid view">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
          </button>
          <button class="view-btn" id="listViewBtn" onclick="setView('list')" title="List view">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
              <line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
              <line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Cards -->
      <div class="workers-grid" id="workersGrid"></div>
    </div>
  </div>

  <!-- ══ WORKER PROFILE MODAL ════════════ -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <div class="modal-header">
        <button class="modal-close" onclick="closeModalDirect()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
        <div class="modal-avatar-row">
          <div class="modal-avatar" id="mAvatar"></div>
          <div>
            <div class="modal-name" id="mName"></div>
            <div class="modal-role" id="mRole"></div>
          </div>
        </div>
        <div class="modal-meta-row" id="mMeta"></div>
      </div>

      <div class="modal-body">
        <div class="modal-stats" id="mStats"></div>

        <div class="modal-section">
          <div class="modal-section-title">Skills & Expertise</div>
          <div class="modal-skills" id="mSkills"></div>
        </div>

        <div class="modal-section">
          <div class="modal-section-title">About</div>
          <p class="modal-bio" id="mBio"></p>
        </div>

        <div class="modal-section">
          <div class="modal-section-title">Recent Reviews</div>
          <div class="modal-reviews" id="mReviews"></div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-modal-primary" onclick="hirePerson()">Hire Now →</button>
        <button class="btn-modal-secondary" onclick="closeModalDirect()">Close</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    <span id="toastMsg"></span>
  </div>

 <script src="js/findjob.js"></script>
 
</body>
</html>
