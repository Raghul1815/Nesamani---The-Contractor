<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Nesamani</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="page-wrap">

    <aside class="brand-panel">
      <div class="brand-inner">
        <div class="brand-logo">
          <span class="logo-mark">N</span>
        </div>
        <h1 class="brand-name">Nesamani</h1>
        <p class="brand-tagline">Join thousands of workers<br>and service providers.</p>
        <ul class="brand-features">
          <li><span class="feat-dot"></span>Free to register</li>
          <li><span class="feat-dot"></span>Get hired fast</li>
          <li><span class="feat-dot"></span>Trusted community</li>
        </ul>
      </div>
      <div class="brand-decoration">
        <div class="dec-ring dec-ring-1"></div>
        <div class="dec-ring dec-ring-2"></div>
        <div class="dec-ring dec-ring-3"></div>
      </div>
    </aside>

    <main class="auth-panel">
      <div class="auth-card auth-card--register">

        <div class="card-header">
          <h2 class="card-title">Create your account</h2>
          <p class="card-sub">Start your journey with Nesamani today</p>
        </div>

        <!-- Role toggle -->
        <div class="role-toggle" id="roleToggle">
          <button class="role-btn active" data-role="worker" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            Worker
          </button>
          <button class="role-btn" data-role="provider" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
            </svg>
            Service Provider
          </button>
          <div class="role-slider"></div>
        </div>
        <input type="hidden" id="role" value="worker">

        <form id="registerForm" class="auth-form" novalidate>

          <div class="field-row">
            <div class="field-group">
              <label for="name" class="field-label">Full Name</label>
              <div class="field-wrap">
                <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
                <input type="text" id="name" class="field-input" placeholder="Ravi Kumar" required>
              </div>
              <span class="field-error" id="name-error"></span>
            </div>

            <div class="field-group">
              <label for="phone" class="field-label">Phone Number</label>
              <div class="field-wrap">
                <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.99 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.92 1.24l3-.12a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.02z"/>
                </svg>
                <input type="tel" id="phone" class="field-input" placeholder="+91 98765 43210" required>
              </div>
              <span class="field-error" id="phone-error"></span>
            </div>
          </div>

          <div class="field-group">
            <label for="email" class="field-label">Email Address</label>
            <div class="field-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="M2 7l10 7 10-7"/>
              </svg>
              <input type="email" id="email" class="field-input" placeholder="you@example.com" required autocomplete="email">
            </div>
            <span class="field-error" id="email-error"></span>
          </div>

          <div class="field-group">
            <label for="password" class="field-label">Password</label>
            <div class="field-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="password" class="field-input" placeholder="Min. 8 characters" required autocomplete="new-password">
              <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password">
                <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" style="display:none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <!-- Strength meter -->
            <div class="strength-wrap" id="strengthWrap">
              <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
              <span class="strength-label" id="strengthLabel">Weak</span>
            </div>
            <span class="field-error" id="pw-error"></span>
          </div>

          <div class="terms-wrap">
            <label class="remember-wrap">
              <input type="checkbox" id="terms" class="remember-cb" required>
              <span class="remember-box"></span>
              <span class="remember-label">I agree to the <a href="#" class="switch-link">Terms &amp; Conditions</a></span>
            </label>
          </div>

          <button type="submit" class="btn-primary" id="registerBtn">
            <span class="btn-text">Create Account</span>
            <span class="btn-spinner" id="registerSpinner"></span>
          </button>

        </form>

        <div class="divider"><span>or</span></div>

        <p class="switch-text">Already have an account? <a href="login.html" class="switch-link">Sign in →</a></p>

      </div>
    </main>

  </div>

  <div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="toastMsg">Registered successfully!</span>
  </div>

  <script src="js/register.js"></script>
</body>
</html>
