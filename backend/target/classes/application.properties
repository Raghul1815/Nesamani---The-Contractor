server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/nesamani_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password_here
