# ── Server ──────────────────────────────
server.port=8080

# ── MySQL Database ───────────────────────
spring.datasource.url=jdbc:mysql://10.15.200.247:3306/nesamani_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=raghul2006
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────
# "update" auto-creates/updates tables — change to "validate" in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ──────────────────────────────────
# Change this secret to a long random string in production (32+ chars)
jwt.secret=NesamaniSuperSecretKey2026PlatformTamilNadu
# Token valid for 24 hours (milliseconds)
jwt.expiration=86400000

# ── CORS ─────────────────────────────────
# Comma-separated list of allowed origins
# Use * for development, restrict to domain in production
cors.allowed-origins=*

# ── Logging ──────────────────────────────
logging.level.com.nesamani=DEBUG
logging.level.org.springframework.security=INFO
